spring:
  application:
    name: backend

  datasource:
    url: jdbc:mysql://localhost:3306/phishing_defense?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    com.phishingdefense.backend: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

server:
  servlet:
    context-path: /
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-at-least-256bits-long}
  expiration: 86400000       # 24 hours
  refresh-expiration: 604800000  # 7 days

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4-turbo
  max-tokens: 500
  temperature: 0.7

oauth2:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/auth/kakao/callback}

  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me
    redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:3000/auth/naver/callback}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>프로필 이미지 업로드 테스트</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
  fieldset { margin-bottom: 20px; }
  label { display: block; margin: 8px 0 4px; font-size: 14px; }
  input[type="email"], input[type="password"], input[type="text"] { width: 100%; padding: 6px; box-sizing: border-box; }
  button { margin-top: 10px; padding: 8px 16px; cursor: pointer; }
  img { max-width: 200px; margin-top: 12px; display: block; border: 1px solid #ccc; }
  pre { background: #f5f5f5; padding: 8px; overflow-x: auto; font-size: 12px; }
</style>
</head>
<body>
  <h2>프로필 이미지 업로드 테스트</h2>

  <fieldset>
    <legend>1. 로그인해서 토큰 받기</legend>
    <label>이메일</label>
    <input type="email" id="email" placeholder="test@example.com">
    <label>비밀번호</label>
    <input type="password" id="password">
    <button onclick="login()">로그인</button>
    <label>Access Token</label>
    <input type="text" id="token" placeholder="로그인하면 자동으로 채워집니다">
  </fieldset>

  <fieldset>
    <legend>2. 파일 탐색기에서 이미지 선택 후 업로드</legend>
    <input type="file" id="file" accept="image/png,image/jpeg,image/webp">
    <button onclick="upload()">업로드</button>
  </fieldset>

  <h3>결과</h3>
  <pre id="result">-</pre>
  <img id="preview" style="display:none">

<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/v1/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  document.getElementById('result').textContent = JSON.stringify(data, null, 2);
  if (res.ok) {
    document.getElementById('token').value = data.accessToken;
  }
}

async function upload() {
  const token = document.getElementById('token').value;
  const fileInput = document.getElementById('file');
  if (!fileInput.files.length) {
    alert('파일을 선택해주세요.');
    return;
  }
  const formData = new FormData();
  formData.append('file', fileInput.files[0]);

  const res = await fetch('/api/v1/users/me/profile-image', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token },
    body: formData
  });
  const data = await res.json();
  document.getElementById('result').textContent = JSON.stringify(data, null, 2);

  const preview = document.getElementById('preview');
  if (res.ok && data.profileImageUrl) {
    preview.src = data.profileImageUrl + '?t=' + Date.now();
    preview.style.display = 'block';
  }
}
</script>
</body>
</html>
